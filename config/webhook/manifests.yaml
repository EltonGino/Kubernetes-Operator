---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-storage-example-com-v1alpha1-cloudbucket
  failurePolicy: Fail
  name: mcloudbucket-v1alpha1.kb.io
  rules:
  - apiGroups:
    - storage.example.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - cloudbuckets
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-storage-example-com-v1alpha1-cloudbucket
  failurePolicy: Fail
  name: vcloudbucket-v1alpha1.kb.io
  rules:
  - apiGroups:
    - storage.example.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - cloudbuckets
  sideEffects: None
